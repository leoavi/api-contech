openapi: 3.0.0
info:
  description: | 
    # Autenticação
    <SecurityDefinitions />

  version: 1.0.0
  title: API de Integração Contech
  x-logo:
    url: http://www.contech.com.br/images/logo.png
servers:
  - url: /v1
security:
  - BearerAuth: []
tags:
  - name: WMS - Ordem de armazenagem
  - name: ERP - Fiscal
  - name: ERP - Materiais e suprimentos
  - name: ERP - Financeiro
  - name: TMS - Posição de mercadoria
  - name: OMS - Vendas
paths:
  /transporte/posicao/consultar:
    get:
      tags:
        - TMS - Posição de mercadoria
      summary: Consultar posição de mercadoria
      description: Retorna informações sobre a mercadoria em transporte
      operationId: getPosicaoMercadoria
      parameters:
        - name: notafiscal
          required: true
          in: query
          description: Chave eletrônica da nota fiscal
          schema:
            type: string
      responses:
        '200':
          description: Informações da mercadoria
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoConsultaChaveNfe'
        '400':
          description: Conteúdo inválido
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
  /transporte/originario/consultarocorrencias:
    get:
      tags:
        - TMS - Posição de mercadoria
      summary: Consultar ocorrências por nota fiscal
      description: Retorna informações sobre as ocorrências vinculadas a nota fiscal
      operationId: getConsultaOcorrenciaNotaFiscal
      parameters:
        - name: chave_nfe
          required: true
          in: query
          description: Chave eletrônica da nota fiscal
          schema:
            type: string
      responses:
        '200':
          description: Informações da ocorrência
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoConsultaOcorrencias'
        '400':
          description: Conteúdo inválido
        '401':
          description: Não autorizado (Autenticação não informada ou inválida ou usuário não está autorizado a realizar a consulta)
        '404':
          description: Chave eletrônica não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoErroConsultaOcorrencias'
  /armazem/ordem/cadastrar:
    post:
      tags:
        - WMS - Ordem de armazenagem
      summary: Criar ordem de armazenagem
      description: Cria uma ordem de armazenagem com base nos dados informados
      operationId: postOrdemArmazenagem
      requestBody:
        $ref: '#/components/requestBodies/PostOrdemArmazenagem'
      responses:
        '200':
          description: Ordem de armazenagem cadastrada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaRetornoCadastroRegistroOrdem'
        '400':
          description: Requisição inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example: Não encontrado processo para a URL
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
        '500':
          description: Conteúdo inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaRetornoErroCadastroRegistroOrdem'
  /armazem/ordem/alterar:
    put:
      tags:
        - WMS - Ordem de armazenagem
      summary: Alterar ordem de armazenagem
      description: Altera a ordem de armazenagem com base nos dados informados
      operationId: putOrdemArmazenagem
      requestBody:
        $ref: '#/components/requestBodies/PutOrdemArmazenagem'
      parameters:
        - name: numeroOrdem
          required: true
          in: query
          description: Número da ordem de armazenagem
          schema:
            type: integer
      responses:
        '200':
          description: Ordem de armazenagem alterada com sucesso
        '400':
          description: Conteúdo inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example: >-
                Campo obrigatório não preenchido  O campo "Tipo" é  obrigatório.
                Preencha o campo para salvar o registro. Campo: TIPO
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
  /armazem/ordem/cancelar:
    put:
      tags:
        - WMS - Ordem de armazenagem
      summary: Cancelar ordem de armazenagem
      description: Cancela a ordem de armazenagem
      operationId: deleteOrdemArmazenagem
      requestBody:
        $ref: '#/components/requestBodies/DeleteOrdemArmazenagem'
      parameters:
        - name: numeroOrdem
          required: true
          in: query
          description: Número da ordem de armazenagem
          schema:
            type: integer
      responses:
        '200':
          description: Ordem de armazenagem cancelada com sucesso
        '400':
          description: Parâmetro(s) inválido(s)
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
  /armazem/ordem/consultar:
    get:
      tags:
        - WMS - Ordem de armazenagem
      summary: Consultar ordem de armazenagem
      description: Retorna todas as informações da ordem de armazenagem
      operationId: getOrdemArmazenagem
      parameters:
        - name: numeroOrdem
          in: query
          description: Número da ordem de armazenagem
          schema:
            type: integer
        - name: numeroPedido
          in: query
          description: Número do pedido
          schema:
            type: string
        - name: numeroDocumento
          in: query
          description: Número do documento de entrada
          schema:
            type: string
        - name: serieDocumento
          in: query
          description: Série do documento de entrada
          schema:
            type: string
      responses:
        '200':
          description: Informações da ordem de armazenagem
          content:
            application/json: 
              schema:
                $ref: '#/components/schemas/RetornoConsultaOrdem'
        '400':
          description: Parâmetro(s) inválido(s)
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
  /armazem/ordem/entradaEncerrada:
    get:
      tags:
        - WMS - Ordem de armazenagem
      summary: Consultar entradas encerradas
      description: Retorna os dados da mercadoria recebida
      operationId: getEntradaEncerrada
      responses:
        '200':
          description: Informações da ordem de armazenagem
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoConsultaEntradaEncerrada'
        '400':
          description: Parâmetro(s) inválido(s)
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
  /armazem/ordem/item:
    post:
      tags:
        - WMS - Ordem de armazenagem
      summary: Criar item
      description: Cria um item na ordem de armazenagem com base nos dados informados
      operationId: postItemOrdemArmazenagem
      parameters:
        - name: numeroOrdem
          required: true
          in: query
          description: Número da ordem de armazenagem
          schema:
            type: integer
      requestBody:
        $ref: '#/components/requestBodies/PostItemOrdemArmazenagem'
      responses:
        '200':
          description: Item da ordem de armazenagem cadastrado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoCadastroRegistro'
        '400':
          description: Conteúdo inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
    delete:
      tags:
        - WMS - Ordem de armazenagem
      summary: Cancelar item
      description: Cancela a ordem de armazenagem
      operationId: deleteItemOrdemArmazenagem
      parameters:
        - name: numeroOrdem
          required: true
          in: query
          description: Número da ordem de armazenagem
          schema:
            type: integer
        - name: codigoProduto
          required: true
          in: query
          description: Código de referência do produto
          schema:
            type: string
        - name: sequencialItem
          required: true
          in: query
          description: Sequencial do item na ordem de armazenagem
          schema:
            type: integer
      responses:
        '200':
          description: Item da ordem de armazenagem cancelado com sucesso
        '400':
          description: Parâmetro(s) inválido(s)
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
  /armazem/ordem/item/lote:
    post:
      tags:
        - WMS - Ordem de armazenagem
      summary: Criar item lote
      description: Cria um item lote na ordem de armazenagem com base nos dados informados
      operationId: postItemLoteOrdemArmazenagem
      parameters:
        - name: numeroOrdem
          required: true
          in: query
          description: Número da ordem de armazenagem
          schema:
            type: integer
        - name: sequencial
          required: true
          in: query
          description: Sequencial do item na ordem de armazenagem
          schema:
            type: integer
      requestBody:
        $ref: '#/components/requestBodies/PostItemLoteOrdemArmazenagem'
      responses:
        '200':
          description: Item lote da ordem de armazenagem cadastrado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoCadastroRegistro'
        '400':
          description: Conteúdo inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
    delete:
      tags:
        - WMS - Ordem de armazenagem
      summary: Cancelar item lote
      description: Cancela a ordem de armazenagem
      operationId: deleteItemLoteOrdemArmazenagem
      parameters:
        - name: numeroOrdem
          required: true
          in: query
          description: Número da ordem de armazenagem
          schema:
            type: integer
        - name: codigoProduto
          required: true
          in: query
          description: Código de referência do produto
          schema:
            type: string
        - name: sequencialItem
          required: true
          in: query
          description: Sequencial do item na ordem de armazenagem
          schema:
            type: integer
        - name: sequencialLote
          required: true
          in: query
          description: Sequencial do lote no item na ordem de armazenagem
          schema:
            type: integer
        - name: lotePesquisa
          required: false
          in: query
          description: Descrição do lote, caso o produto controle informação de lote
          schema:
            type: string
      responses:
        '200':
          description: Item lote da ordem de armazenagem cancelado com sucesso
        '400':
          description: Parâmetro(s) inválido(s)
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
  /armazem/ordem/atrelar:
    post:
      tags:
        - WMS - Ordem de armazenagem
      summary: Atrelar ordens de armazenagem
      description: Atrela uma ordem a outra ordem de armazenagem
      operationId: postAtrelarOrdemArmazenagem
      parameters:
        - name: numeroOrdem
          required: true
          in: query
          description: Número da ordem de armazenagem
          schema:
            type: integer
      requestBody:
        $ref: '#/components/requestBodies/PostAtrelarOrdemArmazenagem'
      responses:
        '200':
          description: Atrelamento da ordem de armazenagem efetuado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoCadastroRegistro'
        '400':
          description: Conteúdo inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
  /armazem/ordem/programacao/cadastrar:
    post:
      tags:
        - WMS - Ordem de armazenagem
      summary: Criar programação
      description: >-
        Cria uma programação na ordem de armazenagem com base nos dados
        informados
      operationId: postProgramacaoOrdemArmazenagem
      parameters:
        - name: numeroOrdem
          required: true
          in: query
          description: Número da ordem de armazenagem
          schema:
            type: integer
      requestBody:
        $ref: '#/components/requestBodies/PostProgramacaoOrdemArmazenagem'
      responses:
        '200':
          description: Programação da ordem de armazenagem cadastrada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoCadastroRegistro'
        '400':
          description: Conteúdo inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
  /armazem/ordem/programacao/adicionarQuantidade:
    post:
      tags:
        - WMS - Ordem de armazenagem
      summary: Adiciona quantidades a programação
      description: Adiciona quantidades a programação da ordem de armazenagem
      operationId: postAdicionaQuantidadeProgramacaoOrdemArmazenagem
      parameters:
        - name: numeroOrdem
          required: true
          in: query
          description: Número da ordem de armazenagem
          schema:
            type: integer
        - name: codigoProduto
          required: true
          in: query
          description: Código de referência do produto
          schema:
            type: string
        - name: sequencial
          required: true
          in: query
          description: Sequencial do produto na programação da ordem
          schema:
            type: integer
      requestBody:
        $ref: >-
          #/components/requestBodies/PostAdicionarQuantidadeProgramacaoOrdemArmazenagem
      responses:
        '200':
          description: Quantidade adicionada com sucesso na programação da ordem
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoCadastroRegistro'
        '400':
          description: Conteúdo inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
  /armazem/ordem/programacao/cancelarQuantidade:
    post:
      tags:
        - WMS - Ordem de armazenagem
      summary: Cancela quantidades da programação
      description: Cancela quantidades da programação da ordem de armazenagem
      operationId: postCancelaQuantidadeProgramacaoOrdemArmazenagem
      parameters:
        - name: numeroOrdem
          required: true
          in: query
          description: Número da ordem de armazenagem
          schema:
            type: integer
        - name: codigoProduto
          required: true
          in: query
          description: Código de referência do produto
          schema:
            type: string
        - name: sequencial
          required: true
          in: query
          description: Sequencial do produto na programação da ordem
          schema:
            type: integer
      requestBody:
        $ref: >-
          #/components/requestBodies/PostCancelarQuantidadeProgramacaoOrdemArmazenagem
      responses:
        '200':
          description: Quantidade cancelada com sucesso na programação da ordem
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoCadastroRegistro'
        '400':
          description: Conteúdo inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
  /armazem/ordem/pedidoPendente:
    get:
      tags:
        - WMS - Ordem de armazenagem
      summary: Consultar pedidos pendentes
      description: >-
        Retorna todos os pedidos que estão aguardando documento fiscal e que
        ainda não foram recebidos pelo cliente
      operationId: getPedidoPendente
      responses:
        '200':
          description: Listagem dos pedidos pendentes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoConsultaPedidoPendente'
        '400':
          description: Parâmetro(s) inválido(s)
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
  /armazem/ordem/removerPedidoFila:
    post:
      tags:
        - WMS - Ordem de armazenagem
      summary: Remover pedido pendente
      description: Remove o pedido da fila de pedidos pendentes
      operationId: postRemoverPedidoFila
      requestBody:
        $ref: '#/components/requestBodies/PostRemoverPedidoFila'
      responses:
        '200':
          description: Pedido removido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoRemocaoPedidoPendente'
        '400':
          description: Conteúdo inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
  /armazem/ordem/etapaExecutada:
    get:
      tags:
        - WMS - Ordem de armazenagem
      summary: Consultar etapas executadas
      description: >-
        Retorna todas as etapas executadas e que ainda não foram recebidos pelo
        cliente
      operationId: getEtapaExecutada
      responses:
        '200':
          description: Listagem das etapas pendentes de consulta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoConsultaEtapaExecutada'
        '400':
          description: Parâmetro(s) inválido(s)
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
  /armazem/ordem/etapaExecutada/remover:
    post:
      tags:
        - WMS - Ordem de armazenagem
      summary: Remover etapa executada pendente
      description: Remove a etapa da fila de etapas pendentes de consulta
      operationId: postRemoverEtapaExecutadaFila
      requestBody:
        $ref: '#/components/requestBodies/PostRemoverEtapaExecutadaFila'
      responses:
        '200':
          description: Etapa removida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoRemocaoEtapaPendente'
        '400':
          description: Conteúdo inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
  /armazem/ordem/estoqueMercadoria:
    get:
      tags:
        - WMS - Ordem de armazenagem
      summary: Consultar estoque de mercadoria
      description: Retorna todos o estoque de mercadoria do cliente
      operationId: getEstoqueMercadoria
      responses:
        '200':
          description: Listagem do estoque do cliente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoConsultaEstoqueMercadoria'
        '400':
          description: Parâmetro(s) inválido(s)
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
  /armazem/ordem/anexo/cadastrar:
    post:
      tags:
        - WMS - Ordem de armazenagem
      summary: Cadastrar anexos da ordem de armazenagem
      description: Cadastra anexos na ordem de armazenagem
      operationId: postOrdemAnexo
      parameters:
        - name: numeroOrdem
          required: true
          in: query
          description: Número da ordem de armazenagem
          schema:
            type: integer
      requestBody:
        $ref: '#/components/requestBodies/PostCadastrarAnexoOrdem'
      responses:
        '200':
          description: Anexo da ordem de armazenagem cadastrado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetornoCadastroRegistro'
        '400':
          description: Conteúdo inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
  /armazem/ordem/anexo/remover:
    post:
      tags:
        - WMS - Ordem de armazenagem
      summary: Remover Anexos da ordem de armazenagem
      description: Exclui anexos na ordem de armazenagem
      operationId: DeleteOrdemAnexo
      parameters:
        - name: numeroOrdem
          required: true
          in: query
          description: Número da ordem de armazenagem
          schema:
            type: integer
        - name: sequencialAnexo
          required: true
          in: query
          description: Sequencial do anexo da ordem (retornado na consulta de ordem)
          schema:
            type: integer
      requestBody:
        $ref: '#/components/requestBodies/PostRemoverAnexoOrdem'
      responses:
        '200':
          description: Anexo da ordem de armazenagem removido com sucesso
        '400':
          description: Parâmetro(s) inválido(s)
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
  /armazem/ordem/originario/cadastrar:
    post:
      tags:
        - WMS - Ordem de armazenagem
      summary: Vincular documento originário na ordem de armazenagem
      description: Vincula o documento originário na ordem de armazenagem
      operationId: postOrdemDocumentoOriginario
      requestBody:
        $ref: '#/components/requestBodies/PostOrdemDocumentoOriginario'
      responses:
        '200':
          description: Originário vinculado na ordem de armazenagem com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaRetornoCadastroRegistroOrdem'
        '400':
          description: Requisição inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example: Não encontrado processo para a URL
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
        '500':
          description: Conteúdo inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaRetornoErroCadastroRegistroOrdem'
  /armazem/ordem/importacaooriginario/cadastrar:
    post:
      tags:
        - WMS - Ordem de armazenagem
      summary: Cadastrar importação de documento eletrônico
      description: Cadastrar importação de documento eletrônico
      operationId: postImportacaoEletronica
      requestBody:
        $ref: '#/components/requestBodies/PostOrdemDocumentoOriginario'
      responses:
        '200':
          description: Importação de documento eletrônico cadastrada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaRetornoCadastroImportacaoEletronica'
        '400':
          description: Requisição inválida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Erro'
              example: Não encontrado processo para a URL
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
        '500':
          description: Conteúdo inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaRetornoErroCadastroImportacaoEletronica'                
                
  /armazem/ordem/ocorrencia/cadastrar:
    post:
      tags:
        - WMS - Ordem de armazenagem
      summary: Cadastrar ocorrência da ordem de armazenagem
      description: Cadastrar ocorrência da ordem de armazenagem
      operationId: PostCadastrarOcorrencia
      requestBody:
        $ref: '#/components/requestBodies/PostCadastrarOcorrencia'
      responses:
        '200':
          description: Solicitação de cancelamento cadastrado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaRetornoincluirOcorrencia'
        '400':
          description: Parâmetro(s) inválido(s)
        '401':
          description: Não autorizado (Autenticação não informada ou inválida)
        '500':
          description: Conteúdo inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListaRetornoErroincluirOcorrencia'
  /armazem/pedido/consultar:
    get:
      tags:
        - WMS - Ordem de armazenagem
      summary: Consultar pedido
