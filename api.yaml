    ParametroProgramacaoGet:
      description: Parâmetro da programação
      type: object
      properties:
        QuantidadeDefinidaPeloSaldoEstoque:
          description: Será separada toda a quantidade em estoque do produto
          type: string
          example: 'N'
        CancelarAutomaticamenteSaldoInsuficiente:
          description: >-
            Caso a quantidade em estoque seja inferior a quantidade programada,
            a quantidade faltante será cancelada e o restante será separado.
          type: string
          example: 'N'
        GerarEmbalagensAutomaticamente:
          description: >-
            Gera as embalagens automaticamente após a confirmação da separação
            da mercadoria
          type: string
          example: S
        GerarEmbalagensPorVolume:
          description: Gera uma embalagem para cada volume
          type: string
          example: 'N'
        NaoExibirMercadoriasAreaOcorrencia:
          description: >-
            Ao exibir as mercadorias para efetuar a separação, não exibe as que
            estão em área de ocorrência
          type: string
          example: 'N'
        NaFaltaMercadoriaProgramarSaldoEstoque:
          description: >-
            Caso a quantidade em estoque seja inferior a quantidade programada,
            a quantidade faltante ficará pendente e o restante será separado.
          type: string
          example: 'N'
        SepararQuantidadeSoltaPeloPrePickingPicking:
          description: >-
            Quando a mercadoria estiver solta, ela será separada somente pelo
            pré-picking e pelo picking
          type: string
          example: 'N'
        AjustarAutomaticamenteQuantidadePelaTolerancia:
          description: >-
            Quando efetuada a separação pelo picking, será permitido o ajuste
            automático da quantidade programada conforme a quantidade dos
            volumes separados, respeitando o percentual de tolerância.
          type: string
          example: 'N'
