components:
  securitySchemes:
    BasicAuth:
      type: http
      scheme: basic
      description: >
        A autenticação inicial com as APIs REST da Contech deve ser realizada
        por uma requisição GET utilizando Basic Auth, para a rota
        /Authorization.


        Para autenticar, devem ser informados os dados de usuário e senha
        fornecidos pelo cliente.


        Esta requisição irá retornar um token que deverá ser utilizado para
        autenticação nas demais rotas. 


        Este token tem uma validade de 24 horas, e após este intervalo deverá
        ser requisitado um novo token.
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        A autenticação para executar qualquer endpoints das APIs REST da Contech deve ser realizada por token 
        utilizando Bearer Token.


        Para autenticar, você deve utilizar o token recebido na rota de /Authorization e adicioná-lo no header da 
        requisição.


        O header de autenticação deve ser enviado para todos os endpoints disponíveis na API.
  schemas:
    Erro:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          description: Descrição do erro
    RetornoConsultaChaveNfe:
      $ref: '#/components/schemas/CamposRetornoPosicaoMercadoriaGet'
    RetornoConsultaOcorrencias:
      $ref: '#/components/schemas/CamposRetornoConsultaOcorrencias'
    RetornoErroConsultaOcorrencias:
      $ref: '#/components/schemas/CamposRetornoErroConsultaOcorrencias'
    RetornoCadastroRegistro:
      type: object
      required:
        - id
      properties:
        id:
          type: integer
          description: int32
          example: 468415
    RetornoPedidoRemovido:
      type: object
      properties:
        Mensagem:
          type: string
          description: Mensagem padrão
          example: Pedido removido da fila com sucesso!
    RetornoEtapaRemovida:
      type: object
      properties:
        Mensagem:
          type: string
          description: Mensagem padrão
          example: Etapa(s) removida(s) da fila com sucesso!
    RetornoMovimentacaoClassificacaoRemovida:
      type: object
      properties:
        Registro:
          type: integer
          description: Handle do registro   
        Mensagem:
          type: string
          description: Mensagem padrão
          example: Movimentação removida da fila com sucesso!
    RetornoErroMovimentacaoClassificacaoRemovida:
      type: object
      properties:   
        Registro:
          type: integer
          description: Handle do registro
        Erro:
          type: string
          description: Erro ao tentar remover a movimentação da fila
          example: Para efetuar o recebimento de uma movimentação, todas as movimentações anteriores válidas devem ter sido recebidas.          
    ListaRetornoCadastroRegistroOrdem:
      type: object
      properties:
        Lista:
          type: array
          items:
            $ref: '#/components/schemas/RetornoCadastroOrdem'
    ListaRetornoCadastroImportacaoEletronica:
      type: object
      properties:
        Lista:
          type: array
          items:
            $ref: '#/components/schemas/RetornoCadastroImportacaoEletronica'            
    ListaRetornoincluirOcorrencia:
      type: object
      properties:
        Lista:
          type: array
          items:
            $ref: '#/components/schemas/RetornoincluirOcorrencia'
    ListaRetornoCadastroRegistroPessoa:
      type: object
      properties:
        Lista:
          type: array
          items:
            $ref: '#/components/schemas/RetornoCadastroPessoa'
