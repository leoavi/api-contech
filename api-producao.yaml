openapi: 3.0.0
info:
  title: API Contech — Produção (espelho do banco ESCALASOFT)
  version: 1.0.0-producao-2026-05-20
  description: |-
    Catálogo dos endpoints **realmente cadastrados** em `IN_WEBSERVICE` (handle=1, "1 - Web service Escalasoft") no banco ESCALASOFT. Espelho fiel do estado de produção em 20/05/2026.

    Diferente da aba **Exemplo** (que mostra o contrato idealizado pela documentação Contech padrão), esta aba reflete exatamente o que está no banco — incluindo inconsistências de convenção de URL, ausência de schemas de payload e ausência de autenticação no registro.

    ## Autenticação

    Todos os 59 endpoints estão cadastrados com `TIPOAUTENTICACAO=5 (Nenhum)`. A autenticação real (Bearer Token) é aplicada por uma **camada de proxy/gateway** no servidor de produção, NÃO pelo registro no banco.

    ## Schemas de payload

    O ESCALASOFT não armazena no banco o schema JSON de entrada/saída de cada endpoint — apenas formato (`application/json`). Os schemas exibidos abaixo são `type: object` vazios, com nota explícita. Para integradores: consultar a implementação real do servidor para o contrato exato.

    ## Estrutura hierárquica no banco

    Cada endpoint vem de uma cadeia de 4 níveis em `IN_WEBSERVICE*`:

    ```
    IN_WEBSERVICE (handle=1)
      └─ IN_WEBSERVICEPRODUTO (tag OpenAPI)
           └─ IN_WEBSERVICEPRODUTOPROCESSO
                 └─ IN_WEBSERVICEOPERACAO (endpoint)
    ```

    O `operationId` de cada endpoint é `op{HANDLE}` — referência direta ao `IN_WEBSERVICEOPERACAO.HANDLE` no banco.
